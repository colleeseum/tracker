name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject build version into client
        env:
          VERSION: ${{ github.run_number }}
        shell: python
        run: |
          import os
          from pathlib import Path
          path = Path("public/index.html")
          text = path.read_text()
          marker = 'data-app-version="__APP_VERSION__"'
          version = os.environ.get("VERSION", "dev")
          if marker not in text:
              raise SystemExit("Version marker not found in public/index.html")
          path.write_text(text.replace(marker, f'data-app-version="{version}"', 1))

      - name: Install Functions dependencies
        run: npm install --prefix functions

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Configure Functions environment
        env:
          SMTP2GO_HOST: ${{ secrets.SMTP2GO_HOST }}
          SMTP2GO_PORT: ${{ secrets.SMTP2GO_PORT }}
          SMTP2GO_USER: ${{ secrets.SMTP2GO_USER }}
          SMTP2GO_PASS: ${{ secrets.SMTP2GO_PASS }}
          SMTP2GO_FROM: ${{ secrets.SMTP2GO_FROM }}
        run: |
          : "${SMTP2GO_USER:?Missing SMTP2GO_USER secret}"
          : "${SMTP2GO_PASS:?Missing SMTP2GO_PASS secret}"
          : "${SMTP2GO_FROM:?Missing SMTP2GO_FROM secret}"
          {
            printf 'SMTP2GO_HOST=%s\n' "${SMTP2GO_HOST:-mail.smtp2go.com}"
            printf 'SMTP2GO_PORT=%s\n' "${SMTP2GO_PORT:-587}"
            printf 'SMTP2GO_USER=%s\n' "$SMTP2GO_USER"
            printf 'SMTP2GO_PASS=%s\n' "$SMTP2GO_PASS"
            printf 'SMTP2GO_FROM=%s\n' "$SMTP2GO_FROM"
          } > functions/.env

      - name: Deploy to Firebase
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: firebase deploy --project tracker-187c5 --only hosting,functions,firestore,storage
